<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>알림 — 팀 인터랙션 라이브러리</title>
  <link rel="stylesheet" href="css/common.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    .app-header { position: fixed; top: 0; left: 0; right: 0; height: var(--header-height); background: #fff; z-index: 50; display: flex; align-items: center; padding: 0 24px; gap: 24px; }
    .header-account .avatar { width: 32px; height: 32px; border-radius: 50%; background: linear-gradient(135deg, var(--accent), #8b5cf6); color: #fff; font-size: 14px; font-weight: 700; display: flex; align-items: center; justify-content: center; }
    .header-search { flex: 1; max-width: 400px; }
    .header-search input { width: 100%; height: 40px; padding: 0 16px 0 40px; font-size: 14px; }
    .btn-publish { display: inline-flex; align-items: center; gap: 8px; height: 40px; padding: 0 18px; background: var(--accent); color: #fff; font-size: 14px; font-weight: 600; border: none; border-radius: 8px; text-decoration: none; }
    .header-account { display: flex; align-items: center; gap: 8px; }
    .header-actions { display: flex; align-items: center; gap: 12px; }
    .header-profile-btn { width: 36px; height: 36px; border-radius: 50%; background: linear-gradient(135deg, #6366f1, #8b5cf6); border: none; color: #fff; font-size: 14px; font-weight: 600; }
    .page-title { font-size: 22px; font-weight: 700; margin-bottom: 20px; color: #111; }
    .empty-state { text-align: center; padding: 48px 24px; color: var(--text-muted); }
    .empty-state svg { margin-bottom: 16px; opacity: 0.5; }
  </style>
</head>
<body>
  <header class="app-header">
    <div class="header-account"><span class="avatar">H</span><span class="name">hongsi's Works...</span></div>
    <div class="header-search"><input type="search" placeholder="라이브러리 검색..."></div>
    <div class="header-actions">
      <a href="register.html" class="btn-publish">+ 라이브러리 등록</a>
      <button type="button" class="header-profile-btn">H</button>
    </div>
  </header>
  <aside class="app-sidebar">
    <div class="sidebar-section"><nav class="sidebar-nav"><a href="index.html">홈</a><a href="discover.html">디스커버</a><a href="my-files.html">마이파일</a><a href="notifications.html" class="active">알림</a></nav></div>
    <div class="sidebar-section"><nav class="sidebar-nav"><a href="archive.html">아카이브</a></nav></div>
  </aside>
  <main class="app-main">
    <h1 class="page-title">알림</h1>
    <div class="empty-state">
      <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
      <p>새 알림이 없습니다.</p>
      <p style="font-size: 14px; margin-top: 8px;">팀원이 라이브러리를 등록하거나 좋아요를 누르면 여기에 표시됩니다.</p>
    </div>
  </main>
</body>
</html>
