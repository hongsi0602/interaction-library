<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script>(function(){var p=location.pathname;if(p&&!p.endsWith('/')){var dir=p.replace(/\/[^/]*$/, '')+'/';var b=document.createElement('base');b.href=location.origin+dir;document.head.insertBefore(b,document.head.firstChild);}})();</script>
  <title>Profile — Team Interaction Library</title>
  <link rel="stylesheet" href="css/common.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    /* 상단바/좌측메뉴는 common.css */
    .page-title { font-size: 24px; font-weight: 700; margin-bottom: 8px; color: #111; }
    .page-desc { color: var(--text-muted); margin-bottom: 32px; font-size: 14px; }
    .profile-card { max-width: 640px; background: #fff; border: 1px solid var(--border); border-radius: 12px; padding: 28px; margin-bottom: 24px; }
    .profile-header { display: flex; align-items: center; gap: 24px; margin-bottom: 28px; padding-bottom: 24px; border-bottom: 1px solid var(--border); }
    .profile-avatar-wrap { flex-shrink: 0; }
    .profile-avatar { width: 80px; height: 80px; border-radius: 50%; background: #e4e4eb; color: #374151; font-size: 32px; font-weight: 700; display: flex; align-items: center; justify-content: center; }
    .profile-avatar img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; }
    .profile-name { font-size: 20px; font-weight: 700; color: #111; margin-bottom: 4px; }
    .profile-email { font-size: 14px; color: var(--text-muted); }
    .form-group { margin-bottom: 20px; }
    .form-group:last-child { margin-bottom: 0; }
    .form-label { display: block; font-size: 14px; font-weight: 600; color: #374151; margin-bottom: 8px; }
    .form-input { width: 100%; padding: 10px 14px; font-size: 14px; border: 1px solid var(--border); border-radius: 8px; font-family: inherit; }
    .form-input:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.15); }
    .form-actions { display: flex; gap: 12px; margin-top: 24px; }
    .btn-submit { padding: 12px 24px; font-size: 14px; font-weight: 600; background: var(--accent); color: #fff; border: none; border-radius: 8px; cursor: pointer; }
    .btn-submit:hover { background: var(--accent-hover); }
    .btn-cancel { padding: 12px 24px; font-size: 14px; font-weight: 500; background: #f3f4f6; color: #374151; border: none; border-radius: 8px; cursor: pointer; text-decoration: none; }
    .btn-cancel:hover { background: #e5e7eb; }
  </style>
</head>
<body>
  <header class="app-header">
    <button type="button" class="sidebar-toggle" aria-label="메뉴 열기">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M3 12h18M3 18h18"/></svg>
    </button>
    <div class="header-logo">Reference</div>
    <div class="header-search-bar">
      <input type="search" class="header-search-input" placeholder="What are you looking for?" aria-label="검색">
      <button type="button" class="header-search-filter" aria-haspopup="listbox" aria-label="필터">All <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 9l6 6 6-6"/></svg></button>
      <button type="button" class="header-search-btn" aria-label="검색"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg></button>
    </div>
    <div class="header-actions">
      <a href="register.html" class="btn-publish">+ Upload</a>
      <a href="profile.html" class="header-profile" aria-label="Profile settings">
        <span class="header-profile-avatar-initial">H</span>
      </a>
    </div>
  </header>

  <aside class="app-sidebar">
    <div class="sidebar-section">
      <nav class="sidebar-nav">
        <a href="index.html"><svg class="sidebar-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>Home</a>
        <a href="project.html"><svg class="sidebar-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="20" height="20"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/></svg>Project</a>
        <a href="my-files.html"><svg class="sidebar-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 19a2 2 0 01-2 2H4a2 2 0 01-2-2V5a2 2 0 012-2h5l2 3h9a2 2 0 012 2z"/></svg>My Files</a>
        <a href="notifications.html"><svg class="sidebar-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 01-3.46 0"/></svg>Notifications</a>
      </nav>
    </div>
    <div class="sidebar-section">
      <nav class="sidebar-nav">
        <a href="archive.html"><svg class="sidebar-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 8v13H3V8"/><path d="M1 3h22v5H1z"/><path d="M10 12h4"/></svg>Archive</a>
      </nav>
    </div>
  </aside>
  <div class="sidebar-overlay" aria-hidden="true"></div>

  <main class="app-main">
    <h1 class="page-title">Profile</h1>
    <p class="page-desc">계정 정보와 표시 이름을 수정할 수 있습니다.</p>

    <div class="profile-card">
      <div class="profile-header">
        <div class="profile-avatar-wrap">
          <div class="profile-avatar" id="profileAvatar">H</div>
        </div>
        <div>
          <div class="profile-name" id="profileName">hongsi's Works</div>
          <div class="profile-email">계정 이메일 (연동 시 표시)</div>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label" for="displayName">표시 이름</label>
        <input type="text" id="displayName" class="form-input" value="hongsi's Works" placeholder="팀원에게 보이는 이름">
      </div>
      <div class="form-group">
        <label class="form-label" for="avatarInitial">프로필 이니셜 (한 글자)</label>
        <input type="text" id="avatarInitial" class="form-input" maxlength="1" value="H" placeholder="H">
      </div>
      <div class="form-actions">
        <button type="button" class="btn-submit" id="btnSave">Save</button>
        <a href="index.html" class="btn-cancel">Cancel</a>
      </div>
    </div>
  </main>

  <script src="js/common.js"></script>
  <script>
    (function() {
      var initial = document.getElementById('avatarInitial');
      var avatar = document.getElementById('profileAvatar');
      var nameEl = document.getElementById('profileName');
      var displayName = document.getElementById('displayName');
      function updatePreview() {
        var val = (initial.value || 'H').trim().slice(0, 1).toUpperCase() || 'H';
        avatar.textContent = val;
        if (displayName.value.trim()) nameEl.textContent = displayName.value.trim();
      }
      initial.addEventListener('input', updatePreview);
      initial.addEventListener('change', updatePreview);
      displayName.addEventListener('input', function() { nameEl.textContent = displayName.value.trim() || 'hongsi\'s Works'; });
      document.getElementById('btnSave').addEventListener('click', function() {
        var val = (initial.value || 'H').trim().slice(0, 1).toUpperCase() || 'H';
        var headers = document.querySelectorAll('.header-profile-avatar-initial');
        for (var i = 0; i < headers.length; i++) headers[i].textContent = val;
        alert('저장되었습니다.');
      });
    })();
  </script>
</body>
</html>
