<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script>(function(){var p=location.pathname;if(p&&!p.endsWith('/')){var dir=p.replace(/\/[^/]*$/, '')+'/';var b=document.createElement('base');b.href=location.origin+dir;document.head.insertBefore(b,document.head.firstChild);}})();</script>
  <title>Project — Team Interaction Library</title>
  <script>location.replace('project.html');</script>
  <link rel="stylesheet" href="css/common.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    /* 상단바/좌측메뉴는 common.css */
    .gallery-title { font-size: 22px; font-weight: 700; margin-bottom: 20px; color: #111; }
    .gallery-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 24px; }
    .gallery-card { background: #fff; border-radius: 12px; border: 1px solid var(--border); overflow: hidden; text-decoration: none; color: inherit; display: block; transition: transform 0.2s, box-shadow 0.2s; }
    .gallery-card:hover { transform: translateY(-2px); box-shadow: 0 12px 24px -8px rgba(0,0,0,0.12); }
    .gallery-card .thumb { aspect-ratio: 16/10; background: #f3f4f6; overflow: hidden; }
    .gallery-card .thumb img,
    .gallery-card .thumb iframe { width: 100%; height: 100%; display: block; border: 0; }
    .gallery-card .thumb img { object-fit: cover; }
    .gallery-card .thumb iframe { object-fit: cover; pointer-events: none; }
    .gallery-card .body { padding: 14px 16px; }
    .gallery-card .card-title { font-size: 15px; font-weight: 600; margin-bottom: 10px; color: #111; }
    .gallery-card .meta { display: flex; align-items: center; gap: 10px; font-size: 13px; color: var(--text-muted); }
    .gallery-card .meta .user-avatar { width: 24px; height: 24px; border-radius: 50%; background: #e4e4eb; color: #374151; font-size: 11px; font-weight: 600; display: flex; align-items: center; justify-content: center; }
    .gallery-card .meta .stats { margin-left: auto; }
    .gallery-card .thumb .thumb-inner { width: 100%; height: 100%; display: block; }
    .gallery-card .thumb .thumb-inner img,
    .gallery-card .thumb .thumb-inner iframe { width: 100%; height: 100%; display: block; border: 0; object-fit: cover; }
    .gallery-card.spline-card .thumb .thumb-inner { width: 100%; height: 100%; }
  </style>
</head>
<body>
  <header class="app-header">
    <button type="button" class="sidebar-toggle" aria-label="메뉴 열기">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M3 12h18M3 18h18"/></svg>
    </button>
    <div class="header-logo">Reference</div>
    <div class="header-search-bar">
      <input type="search" class="header-search-input" placeholder="What are you looking for?" aria-label="검색">
      <button type="button" class="header-search-filter" aria-haspopup="listbox" aria-label="필터">All <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 9l6 6 6-6"/></svg></button>
      <button type="button" class="header-search-btn" aria-label="검색"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg></button>
    </div>
    <div class="header-actions">
      <a href="register.html" class="btn-publish">+ Upload</a>
      <a href="profile.html" class="header-profile" aria-label="Profile settings">
        <span class="header-profile-avatar-initial">H</span>
      </a>
    </div>
  </header>
  <aside class="app-sidebar">
    <div class="sidebar-section">
      <nav class="sidebar-nav">
        <a href="index.html"><svg class="sidebar-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>Home</a>
        <a href="discover.html" class="active"><svg class="sidebar-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polygon points="16.24 7.76 14.12 14.12 7.76 16.24 9.88 9.88 16.24 7.76"/></svg>Discover</a>
        <a href="my-files.html"><svg class="sidebar-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 19a2 2 0 01-2 2H4a2 2 0 01-2-2V5a2 2 0 012-2h5l2 3h9a2 2 0 012 2z"/></svg>My Files</a>
        <a href="notifications.html"><svg class="sidebar-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 01-3.46 0"/></svg>Notifications</a>
      </nav>
    </div>
    <div class="sidebar-section">
      <nav class="sidebar-nav">
        <a href="archive.html"><svg class="sidebar-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 8v13H3V8"/><path d="M1 3h22v5H1z"/><path d="M10 12h4"/></svg>Archive</a>
      </nav>
    </div>

  <div class="sidebar-overlay" aria-hidden="true"></div>
  <main class="app-main">
    <h1 class="gallery-title">Discover</h1>
    <p style="color: var(--text-muted); margin-bottom: 24px;">팀에서 공유된 인터랙션을 탐색하세요.</p>
    <div class="gallery-grid" id="galleryGrid"></div>
  </main>
  <script src="js/supabase-config.js"></script>
  <script src="js/common.js"></script>
  <script src="js/data.js"></script>
  <script>
    function escapeHtml(s) { if (s == null) return ''; var d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
    function thumbContent(lib) {
      if (lib.previewEmbed && lib.previewEmbed.trim()) return '<iframe title="' + escapeHtml(lib.title) + ' 미리보기" sandbox="allow-scripts allow-same-origin" loading="lazy" data-preview-embed></iframe>';
      if (lib.previewUrl && lib.previewUrl !== '#') return '<iframe src="' + escapeHtml(lib.previewUrl) + '" title="' + escapeHtml(lib.title) + ' 미리보기" loading="lazy"></iframe>';
      return '<img src="' + escapeHtml(lib.thumbnail || '') + '" alt="' + escapeHtml(lib.title) + '" loading="lazy" onerror="this.src=\'https://images.unsplash.com/photo-1558591710-4b4a1ae0f04d?w=600&q=80\'">';
    }
    const grid = document.getElementById('galleryGrid');
    function renderDiscover() {
      var libs = typeof getAllLibraries === 'function' ? getAllLibraries() : LIBRARIES;
      grid.innerHTML = libs.map(function(lib) {
      var isSplineCard = lib.isSpline || (String(lib.id || '').indexOf('upload-') === 0 && lib.embedCodes && typeof lib.embedCodes === 'object' && Object.keys(lib.embedCodes).length > 0);
      var cardClass = 'gallery-card' + (isSplineCard ? ' spline-card' : '');
      return '<a href="detail.html#' + encodeURIComponent(lib.id) + '" class="' + cardClass + '"><div class="thumb"><div class="thumb-inner">' + thumbContent(lib) + '</div></div><div class="body"><h2 class="card-title">' + escapeHtml(lib.title) + '</h2><div class="meta"><span class="user-avatar">' + escapeHtml(lib.authorAvatar) + '</span><span>' + escapeHtml(lib.author) + '</span><span class="stats">' + lib.views + ' views · ' + lib.likes + ' likes</span></div></div></a>';
    }).join('');
      libs.forEach(function(lib, i) {
        if (lib.previewEmbed && lib.previewEmbed.trim()) {
          var card = grid.children[i];
          var iframe = card && card.querySelector('.thumb-inner iframe[data-preview-embed]');
          if (iframe) {
            var embed = lib.previewEmbed;
            var isSpline = lib.isSpline || (String(lib.id || '').indexOf('upload-') === 0 && lib.embedCodes && typeof lib.embedCodes === 'object' && Object.keys(lib.embedCodes).length > 0);
            if (isSpline && embed.indexOf('setZoom(0.5)') === -1 && embed.indexOf('Application') !== -1 && embed.indexOf('.load(') !== -1) {
              embed = embed.replace(/\.load\(\s*"([^"]*)"\s*\)\s*;?/g, '.load("$1").then(function(){a.setZoom(0.5);});');
              embed = embed.replace(/\.load\(\s*\'([^\']*)\'\s*\)\s*;?/g, ".load('$1').then(function(){a.setZoom(0.5);});");
            }
            iframe.srcdoc = embed;
          }
        }
      });
    }
    renderDiscover();
    window.addEventListener('interaction-library-loaded', renderDiscover);
  </script>
</body>
</html>
