<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>라이브러리 상세 — 팀 인터랙션 라이브러리</title>
  <link rel="stylesheet" href="css/common.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    .app-header { position: fixed; top: 0; left: 0; right: 0; height: var(--header-height); background: #fff; z-index: 50; display: flex; align-items: center; padding: 0 24px; gap: 24px; }
    .header-account { display: flex; align-items: center; gap: 8px; padding: 6px 12px; border-radius: 8px; cursor: pointer; }
    .header-account:hover { background: #f3f4f6; }
    .header-account .avatar { width: 32px; height: 32px; border-radius: 50%; background: linear-gradient(135deg, var(--accent), #8b5cf6); color: #fff; font-size: 14px; font-weight: 700; display: flex; align-items: center; justify-content: center; }
    .header-account .name { font-size: 14px; font-weight: 500; color: #374151; }
    .header-search { flex: 1; max-width: 400px; margin: 0 16px; }
    .header-search input { width: 100%; height: 40px; padding: 0 16px 0 40px; font-size: 14px; }
    .header-search input:focus { outline: none; border-color: var(--accent); }
    .header-actions { display: flex; align-items: center; gap: 12px; }
    .btn-publish { display: inline-flex; align-items: center; gap: 8px; height: 40px; padding: 0 18px; background: var(--accent); color: #fff; font-size: 14px; font-weight: 600; border: none; border-radius: 8px; cursor: pointer; text-decoration: none; }
    .btn-publish:hover { background: var(--accent-hover); }
    .header-profile-btn { width: 36px; height: 36px; border-radius: 50%; background: linear-gradient(135deg, #6366f1, #8b5cf6); border: none; cursor: pointer; color: #fff; font-size: 14px; font-weight: 600; }

    .detail-back { display: inline-flex; align-items: center; gap: 8px; font-size: 14px; color: var(--text-muted); text-decoration: none; margin-bottom: 24px; padding: 8px 0; border-radius: 8px; transition: color 0.2s, background 0.2s; }
    .detail-back:hover { color: var(--accent); background: #f9fafb; }
    .detail-hero { margin-bottom: 32px; }
    .detail-title { font-size: 28px; font-weight: 700; margin-bottom: 12px; color: #111; letter-spacing: -0.02em; line-height: 1.2; }
    .detail-meta { display: flex; align-items: center; gap: 16px; flex-wrap: wrap; margin-bottom: 16px; }
    .detail-meta .user-avatar { width: 36px; height: 36px; border-radius: 50%; background: linear-gradient(135deg, #94a3b8, #64748b); color: #fff; font-size: 14px; font-weight: 600; display: inline-flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .detail-meta .author-name { font-weight: 600; color: #374151; }
    .detail-meta .stats { color: var(--text-muted); font-size: 14px; }
    .detail-desc { font-size: 15px; color: #4b5563; line-height: 1.7; margin-bottom: 16px; }
    .detail-tags { display: flex; flex-wrap: wrap; gap: 8px; }
    .detail-tag { display: inline-block; padding: 6px 12px; font-size: 12px; font-weight: 500; color: var(--accent); background: #eef2ff; border-radius: 999px; }

    .preview-section { margin-bottom: 40px; }
    .preview-label { font-size: 12px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 12px; }
    .preview-frame-wrap {
      border-radius: 16px;
      border: 1px solid var(--border);
      overflow: hidden;
      background: #0f0f23;
      aspect-ratio: 16/9;
      min-height: 360px;
      position: relative;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    }
    .preview-frame-wrap iframe { width: 100%; height: 100%; border: none; display: block; }
    .preview-frame-wrap .preview-placeholder { display: flex; align-items: center; justify-content: center; height: 100%; color: var(--text-muted); font-size: 14px; padding: 24px; text-align: center; }
    .preview-replay { position: absolute; bottom: 16px; right: 16px; padding: 10px 18px; font-size: 13px; font-weight: 600; background: #fff; color: #111; border: none; border-radius: 10px; cursor: pointer; box-shadow: 0 2px 12px rgba(0,0,0,0.15); transition: transform 0.15s, box-shadow 0.15s; }
    .preview-replay:hover { transform: translateY(-1px); box-shadow: 0 4px 16px rgba(0,0,0,0.2); }

    .code-section { margin-bottom: 48px; }
    .code-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; flex-wrap: wrap; gap: 8px; }
    .code-label { font-size: 12px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.06em; }
    .code-tabs { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 12px; }
    .code-tab { padding: 8px 14px; font-size: 13px; font-weight: 500; color: var(--text-muted); background: #f9fafb; border: 1px solid var(--border); border-radius: 8px; cursor: pointer; transition: color 0.15s, background 0.15s, border-color 0.15s; }
    .code-tab:hover { color: #374151; background: #f3f4f6; }
    .code-tab.active { color: var(--accent); background: #eef2ff; border-color: var(--accent); }
    .code-panel { display: none; }
    .code-panel.active { display: block; }
    .code-panel-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; flex-wrap: wrap; gap: 8px; }
    .copy-btn { padding: 10px 18px; font-size: 13px; font-weight: 600; background: #eef2ff; color: var(--accent); border: none; border-radius: 10px; cursor: pointer; display: inline-flex; align-items: center; gap: 8px; transition: background 0.15s, color 0.15s; }
    .copy-btn:hover { background: #e0e7ff; }
    .copy-btn.copied { background: #10b981; color: #fff; }
    .code-block {
      font-family: 'SF Mono', 'Monaco', 'Consolas', monospace;
      font-size: 13px;
      line-height: 1.65;
      background: #1e1e2e;
      color: #e2e8f0;
      padding: 24px;
      border-radius: 16px;
      overflow-x: auto;
      white-space: pre-wrap;
      word-break: break-all;
      border: 1px solid rgba(255,255,255,0.06);
      box-shadow: 0 4px 24px rgba(0,0,0,0.12);
    }
    .code-block code { color: inherit; }

    .detail-others { margin-top: 48px; padding-top: 32px; border-top: 1px solid var(--border); }
    .detail-others-title { font-size: 18px; font-weight: 700; margin-bottom: 20px; color: #111; }
    .detail-others-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 16px; }
    .detail-others-card { display: block; padding: 16px; background: #fff; border: 1px solid var(--border); border-radius: 12px; text-decoration: none; color: inherit; font-size: 14px; font-weight: 500; transition: border-color 0.2s, box-shadow 0.2s; }
    .detail-others-card:hover { border-color: var(--accent); box-shadow: 0 4px 12px rgba(99,102,241,0.12); }
    .detail-others-card.current { border-color: var(--accent); background: #fafaff; }
  </style>
</head>
<body>
  <header class="app-header">
    <div class="header-account">
      <span class="avatar">H</span>
      <span class="name">hongsi's Works...</span>
    </div>
    <div class="header-search">
      <input type="search" placeholder="라이브러리 검색..." aria-label="라이브러리 검색">
    </div>
    <div class="header-actions">
      <a href="register.html" class="btn-publish">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg>
        라이브러리 등록
      </a>
      <button type="button" class="header-profile-btn">H</button>
    </div>
  </header>

  <aside class="app-sidebar">
    <div class="sidebar-section">
      <nav class="sidebar-nav">
        <a href="index.html">홈</a>
        <a href="discover.html">디스커버</a>
        <a href="my-files.html">마이파일</a>
        <a href="notifications.html">알림</a>
      </nav>
    </div>
    <div class="sidebar-section">
      <nav class="sidebar-nav">
        <a href="archive.html">아카이브</a>
      </nav>
    </div>
  </aside>

  <main class="app-main">
    <a href="index.html" class="detail-back">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
      라이브러리 목록으로
    </a>

    <div id="detailContent"></div>

    <section class="detail-others" id="detailOthers" style="display: none;">
      <h2 class="detail-others-title">다른 라이브러리</h2>
      <div class="detail-others-grid" id="detailOthersGrid"></div>
    </section>
  </main>

  <script src="js/data.js"></script>
  <script>
    function escapeHtml(s) {
      if (s == null) return '';
      const div = document.createElement('div');
      div.textContent = s;
      return div.innerHTML;
    }

    var CODE_TAB_ORDER = ['Vanilla JS', 'React', 'Next.js', 'iframe', 'React / Next', 'HTML (스크립트)', 'npm + HTML'];
    function orderedEmbedCodeKeys(embedCodes) {
      var keys = Object.keys(embedCodes);
      var ordered = CODE_TAB_ORDER.filter(function(k) { return embedCodes.hasOwnProperty(k); });
      keys.forEach(function(k) { if (ordered.indexOf(k) === -1) ordered.push(k); });
      return ordered;
    }
    function buildCodeSectionHtml(lib) {
      var codes = lib.embedCodes && Object.keys(lib.embedCodes).length > 0 ? lib.embedCodes : null;
      var copySvg = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>';
      if (codes) {
        var ordered = orderedEmbedCodeKeys(codes);
        var tabsHtml = '<div class="code-tabs">' + ordered.map(function(label, idx) {
          return '<button type="button" class="code-tab' + (idx === 0 ? ' active' : '') + '" data-tab-index="' + idx + '">' + escapeHtml(label) + '</button>';
        }).join('') + '</div>';
        var panelsHtml = ordered.map(function(label, idx) {
          var code = codes[label];
          return '<div class="code-panel' + (idx === 0 ? ' active' : '') + '" id="codePanel' + idx + '" data-tab-index="' + idx + '">' +
            '<div class="code-panel-header">' +
              '<span class="code-label">' + escapeHtml(label) + '</span>' +
              '<button type="button" class="copy-btn" data-copy-index="' + idx + '">' + copySvg + ' 복사</button>' +
            '</div>' +
            '<pre class="code-block"><code>' + escapeHtml(code) + '</code></pre>' +
            '</div>';
        }).join('');
        return '<div class="code-header"><span class="code-label">바로 사용 가능한 코드</span></div>' + tabsHtml + '<div class="code-panels">' + panelsHtml + '</div>';
      }
      var singleCode = (lib.embedCode != null && lib.embedCode !== '') ? String(lib.embedCode) : '';
      return '<div class="code-header">' +
        '<span class="code-label">바로 사용 가능한 코드</span>' +
        '<button type="button" class="copy-btn" id="copyCodeBtn">' + copySvg + ' 복사</button>' +
        '</div>' +
        '<pre class="code-block"><code>' + escapeHtml(singleCode) + '</code></pre>';
    }

    var id = '';
    try {
      var hash = location.hash ? String(location.hash).replace(/^#/, '').trim() : '';
      var q = new URLSearchParams(location.search).get('id');
      if (hash) id = decodeURIComponent(hash);
      else if (q != null && String(q).trim()) id = String(q).trim();
    } catch (e) {}
    id = id || '';
    var lib = null;
    if (typeof getLibraryById !== 'undefined' && id) {
      lib = getLibraryById(id);
    }
    if (!lib && typeof LIBRARIES !== 'undefined' && LIBRARIES.length) {
      lib = id ? null : LIBRARIES[0];
    }
    const container = document.getElementById('detailContent');
    const othersSection = document.getElementById('detailOthers');
    const othersGrid = document.getElementById('detailOthersGrid');

    if (!lib || !container) {
      container.innerHTML = '<div class="detail-hero"><p class="detail-title">라이브러리를 찾을 수 없습니다.</p><p style="color:var(--text-muted);margin-top:8px;">목록에서 항목을 선택해 주세요.</p><a href="index.html" style="display:inline-block;margin-top:16px;padding:12px 20px;background:var(--accent);color:#fff;border-radius:10px;text-decoration:none;font-weight:600;">목록으로 돌아가기</a></div>';
    } else {
      const hasEmbed = lib.previewEmbed && lib.previewEmbed.trim().length > 0;
      const hasUrl = lib.previewUrl && lib.previewUrl !== '#';
      const previewHtml = hasEmbed
        ? '<iframe id="previewIframe" sandbox="allow-scripts allow-same-origin" title="' + escapeHtml(lib.title) + ' 미리보기"></iframe><button type="button" class="preview-replay" id="previewReplay">다시 재생</button>'
        : hasUrl
          ? '<iframe src="' + escapeHtml(lib.previewUrl) + '" title="' + escapeHtml(lib.title) + ' 미리보기"></iframe>'
          : '<div class="preview-placeholder">미리보기 URL 또는 미리보기 코드를 등록하면 여기서 실행됩니다.</div>';
      const tagsHtml = (lib.tags && lib.tags.length) ? '<div class="detail-tags">' + lib.tags.map(function(t){ return '<span class="detail-tag">' + escapeHtml(t) + '</span>'; }).join('') + '</div>' : '';
      container.innerHTML =
        '<div class="detail-hero">' +
          '<h1 class="detail-title">' + escapeHtml(lib.title) + '</h1>' +
          '<div class="detail-meta">' +
            '<span class="user-avatar">' + escapeHtml(lib.authorAvatar) + '</span>' +
            '<span class="author-name">' + escapeHtml(lib.author) + '</span>' +
            '<span class="stats">' + (lib.views || 0) + ' views · ' + (lib.likes || 0) + ' likes</span>' +
          '</div>' +
          (lib.description ? '<p class="detail-desc">' + escapeHtml(lib.description) + '</p>' : '') +
          tagsHtml +
        '</div>' +
        '<section class="preview-section">' +
          '<div class="preview-label">실제 미리보기</div>' +
          '<div class="preview-frame-wrap">' + previewHtml + '</div>' +
        '</section>' +
        '<section class="code-section">' + buildCodeSectionHtml(lib) + '</section>';

      if (lib.embedCodes && Object.keys(lib.embedCodes).length > 0) {
        var orderedKeys = orderedEmbedCodeKeys(lib.embedCodes);
        container.querySelectorAll('.code-tab').forEach(function(tab) {
          tab.addEventListener('click', function() {
            var idx = parseInt(this.getAttribute('data-tab-index'), 10);
            container.querySelectorAll('.code-tab').forEach(function(t) { t.classList.remove('active'); });
            container.querySelectorAll('.code-panel').forEach(function(p) { p.classList.remove('active'); });
            this.classList.add('active');
            var panel = document.getElementById('codePanel' + idx);
            if (panel) panel.classList.add('active');
          });
        });
        container.querySelectorAll('.code-section .copy-btn[data-copy-index]').forEach(function(btn) {
          btn.addEventListener('click', function() {
            var idx = parseInt(this.getAttribute('data-copy-index'), 10);
            var code = lib.embedCodes[orderedKeys[idx]];
            navigator.clipboard.writeText(code).then(function() {
              btn.classList.add('copied');
              btn.innerHTML = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 6L9 17l-5-5"/></svg> 복사됨';
              setTimeout(function() {
                btn.classList.remove('copied');
                btn.innerHTML = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg> 복사';
              }, 2000);
            });
          });
        });
      } else {
        var singleCopyBtn = document.getElementById('copyCodeBtn');
        if (singleCopyBtn) singleCopyBtn.addEventListener('click', function () {
          var code = lib.embedCode;
          navigator.clipboard.writeText(code).then(function () {
            this.classList.add('copied');
            this.innerHTML = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 6L9 17l-5-5"/></svg> 복사됨';
            var btn = this;
            setTimeout(function () {
              btn.classList.remove('copied');
              btn.innerHTML = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg> 복사';
            }, 2000);
          }.bind(this));
        });
      }

      if (hasEmbed) {
        var iframe = document.getElementById('previewIframe');
        if (iframe) iframe.srcdoc = lib.previewEmbed;
        var replayBtn = document.getElementById('previewReplay');
        if (replayBtn) replayBtn.addEventListener('click', function () {
          if (iframe) iframe.srcdoc = lib.previewEmbed;
        });
      }

      if (typeof LIBRARIES !== 'undefined' && LIBRARIES.length > 1 && othersSection && othersGrid) {
        othersSection.style.display = 'block';
        othersGrid.innerHTML = LIBRARIES.filter(function(l) { return l.id !== lib.id; }).slice(0, 6).map(function(l) {
          var isCurrent = l.id === lib.id;
          return '<a href="detail.html#' + encodeURIComponent(l.id) + '" class="detail-others-card' + (isCurrent ? ' current' : '') + '">' + escapeHtml(l.title) + '</a>';
        }).join('');
      }
    }

    window.addEventListener('hashchange', function () { location.reload(); });
  </script>
</body>
</html>
